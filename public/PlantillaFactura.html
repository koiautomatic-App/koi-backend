<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap');

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: #f0ebe3;
      padding: 24px;
    }

    .page {
      max-width: 780px;
      margin: auto;
      background: #fff;
      border-radius: 4px;
      overflow: hidden;
    }

    /* ── BARRA SUPERIOR DE COLOR ── */
    .color-bar {
      height: 6px;
      background: linear-gradient(90deg, #e28a71 0%, #c9a882 50%, #b2936f 100%);
    }

    /* ── HEADER ── */
    .header {
      padding: 44px 52px 36px;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      border-bottom: 1px solid #f0ebe3;
    }

    .marca {
      font-family: 'Syne', sans-serif;
      font-size: 36px;
      font-weight: 800;
      color: #e28a71;
      letter-spacing: -1.5px;
      line-height: 1;
      margin-bottom: 8px;
    }

    .razon {
      font-size: 11px;
      font-weight: 400;
      color: #b2936f;
      letter-spacing: 0.5px;
      margin-bottom: 2px;
    }

    .cuit-line {
      font-size: 11px;
      color: #c9b8a8;
    }

    .comp-block {
      text-align: right;
    }

    .comp-label {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: #c9a882;
      margin-bottom: 4px;
    }

    .comp-nro {
      font-family: 'Syne', sans-serif;
      font-size: 32px;
      font-weight: 800;
      color: #2e1f14;
      letter-spacing: -1px;
      line-height: 1;
      margin-bottom: 10px;
    }

    .comp-fecha {
      font-size: 12px;
      color: #8c7060;
      line-height: 1.8;
    }

    /* ── BODY ── */
    .body {
      padding: 40px 52px;
    }

    /* ── TABLA ── */
    .tabla-items {
      width: 100%;
      border-collapse: collapse;
      margin-bottom: 0;
    }

    .tabla-items thead tr th {
      font-size: 9px;
      font-weight: 600;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      color: #c9a882;
      padding: 0 0 14px 0;
      border-bottom: 1px solid #f0ebe3;
    }

    .tabla-items thead tr th:not(:first-child) {
      text-align: right;
    }

    .tabla-items tbody tr td {
      padding: 18px 0;
      font-size: 14px;
      color: #2e1f14;
      border-bottom: 1px solid #f9f5f0;
      vertical-align: top;
    }

    .tabla-items tbody tr td:not(:first-child) {
      text-align: right;
      color: #6b4f3a;
    }

    .tabla-items tbody tr:last-child td {
      border-bottom: none;
    }

    /* ── TOTAL ── */
    .total-section {
      display: flex;
      justify-content: flex-end;
      padding: 24px 0 40px;
      border-top: 1px solid #f0ebe3;
    }

    .total-inner {
      display: flex;
      align-items: baseline;
      gap: 16px;
    }

    .total-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #c9a882;
    }

    .total-amount {
      font-family: 'Syne', sans-serif;
      font-size: 38px;
      font-weight: 800;
      color: #e28a71;
      letter-spacing: -1.5px;
      line-height: 1;
    }

    /* ── FOOTER AFIP ── */
    .footer-afip {
      margin: 0 52px 40px;
      padding: 20px 24px;
      background: #fdf8f4;
      border: 1px solid #f0ebe3;
      border-left: 3px solid #e28a71;
      border-radius: 0 4px 4px 0;
      display: flex;
      align-items: center;
      gap: 24px;
    }

    .qr-wrap {
      flex-shrink: 0;
      width: 90px;
      height: 90px;
      background: #fff;
      border: 1px solid #e8ddd5;
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .qr-wrap img {
      width: 90px;
      height: 90px;
      display: block;
    }

    .qr-placeholder {
      font-size: 9px;
      color: #c9b8a8;
      text-align: center;
    }

    .cae-info { flex: 1; }

    .cae-label {
      font-size: 9px;
      font-weight: 600;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      color: #e28a71;
      margin-bottom: 6px;
    }

    .cae-num {
      font-family: 'Syne', sans-serif;
      font-size: 15px;
      font-weight: 700;
      color: #2e1f14;
      margin-bottom: 3px;
      letter-spacing: -0.3px;
    }

    .cae-vto {
      font-size: 12px;
      color: #8c7060;
      margin-bottom: 10px;
    }

    .cae-ok {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 10px;
      font-weight: 600;
      color: #2d6a4f;
      letter-spacing: 0.5px;
    }

    .cae-ok::before {
      content: '';
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #2d6a4f;
      flex-shrink: 0;
    }

    /* ── KOI BADGE ── */
    .koi-strip {
      background: #080810;
      padding: 14px 52px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .koi-logo {
      width: 24px;
      height: 24px;
      border-radius: 5px;
      object-fit: cover;
      flex-shrink: 0;
    }

    .koi-text {
      font-family: 'DM Sans', sans-serif;
      font-size: 11px;
      font-weight: 500;
      color: #00e676;
      letter-spacing: 0.3px;
      white-space: nowrap;
    }

    .koi-text strong {
      font-weight: 700;
    }

    .koi-dot {
      width: 3px;
      height: 3px;
      border-radius: 50%;
      background: rgba(0,230,118,0.3);
      flex-shrink: 0;
    }

    .koi-url {
      font-size: 10px;
      color: rgba(0,230,118,0.4);
      letter-spacing: 0.5px;
    }
  </style>
</head>
<body>
  <div class="page">

    <div class="color-bar"></div>

    <!-- HEADER -->
    <div class="header">
      <div>
        <div class="marca"><?= NOMBRE_FANTASIA ?></div>
        <div class="razon"><?= RAZON_SOCIAL ?></div>
        <div class="cuit-line">CUIT <?= CUIT_VENDEDOR ?></div>
      </div>
      <div class="comp-block">
        <div class="comp-label">Factura C</div>
        <div class="comp-nro">N° <?= NRO_COMPROBANTE ?></div>
        <div class="comp-fecha">
          <?= FECHA ?>
        </div>
      </div>
    </div>

    <!-- BODY -->
    <div class="body">
      <table class="tabla-items">
        <thead>
          <tr>
            <th style="text-align:left;width:55%">Descripción</th>
            <th>Cant.</th>
            <th>P. Unitario</th>
            <th>Subtotal</th>
          </tr>
        </thead>
        <tbody><?!= FILAS_ITEMS ?></tbody>
      </table>

      <div class="total-section">
        <div class="total-inner">
          <span class="total-label">Total</span>
          <span class="total-amount">$<?= TOTAL ?></span>
        </div>
      </div>
    </div>

    <!-- FOOTER AFIP -->
    <div class="footer-afip">
      <div class="qr-wrap">
        <? if (URL_QR_AFIP) { ?>
          <img src="<?!= URL_QR_AFIP ?>" width="90" height="90">
        <? } else { ?>
          <div class="qr-placeholder">QR AFIP</div>

      </div>
      <div class="cae-info">
        <div class="cae-label">Validación AFIP</div>
        <div class="cae-num"><?= CAE_DISPLAY ?></div>
        <div class="cae-vto">Vencimiento <?= CAE_VTO ?></div>
        <div class="cae-ok">Comprobante autorizado</div>
      </div>
