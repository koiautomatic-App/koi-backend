<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KOI · Admin Backstage</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f9fafb; }
        .card { background: white; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
    </style>
</head>
<body class="p-8">
    <div class="max-w-6xl mx-auto">
        <header class="flex justify-between items-center mb-8">
            <div>
                <h1 class="text-2xl font-semibold text-gray-800">🐟 KOI Admin</h1>
                <p class="text-gray-500 text-sm">Gestión de Carpeta Fiscal (Conserjería)</p>
            </div>
            <button onclick="fetchPendientes()" class="bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700 transition">
                Actualizar Lista
            </button>
        </header>

        <div class="card overflow-hidden">
            <table class="w-full text-left">
                <thead class="bg-gray-50 border-b">
                    <tr>
                        <th class="px-6 py-4 text-xs font-semibold text-gray-500 uppercase">Cliente</th>
                        <th class="px-6 py-4 text-xs font-semibold text-gray-500 uppercase">CUIT / Clave ARCA</th>
                        <th class="px-6 py-4 text-xs font-semibold text-gray-500 uppercase">Estado Actual</th>
                        <th class="px-6 py-4 text-xs font-semibold text-gray-500 uppercase text-right">Acciones</th>
                    </tr>
                </thead>
                <tbody id="lista-pendientes">
                    </tbody>
            </table>
        </div>
    </div>

    <script>
        async function fetchPendientes() {
            const res = await fetch('/api/admin/pendientes');
            const data = await res.json();
            
            if (!data.ok) {
                alert("Error: " + (data.error || "No autorizado"));
                return;
            }

            const container = document.getElementById('lista-pendientes');
            container.innerHTML = data.lista.map(item => `
                <tr class="border-b hover:bg-gray-50 transition">
                    <td class="px-6 py-4">
                        <div class="font-medium text-gray-800">${item.cliente}</div>
                        <div class="text-xs text-gray-500">${item.email}</div>
                    </td>
                    <td class="px-6 py-4">
                        <div class="text-sm font-mono bg-gray-100 p-1 rounded inline-block mb-1">${item.cuit}</div>
                        <div class="text-sm text-blue-600 font-semibold select-all cursor-pointer" title="Click para copiar">${item.claveFiscal}</div>
                    </td>
                    <td class="px-6 py-4">
                        <span class="px-2 py-1 text-xs rounded-full ${item.status === 'pendiente' ? 'bg-orange-100 text-orange-700' : 'bg-blue-100 text-blue-700'}">
                            ${item.status}
                        </span>
                        <p class="text-xs text-gray-400 mt-1 italic">${item.notas || ''}</p>
                    </td>
                    <td class="px-6 py-4 text-right">
                        <button onclick="updateStatus('${item.id}', 'vinculado')" class="text-xs bg-green-500 text-white px-3 py-1 rounded hover:bg-green-600 mr-2">Vincular OK</button>
                        <button onclick="updateStatus('${item.id}', 'error')" class="text-xs bg-red-100 text-red-600 px-3 py-1 rounded hover:bg-red-200">Error</button>
                    </td>
                </tr>
            `).join('');
        }

        async function updateStatus(userId, nuevoStatus) {
            const notas = prompt("Notas para el cliente (ej: Punto de venta 001 configurado):");
            if (notas === null) return;

            const res = await fetch('/api/admin/update-status', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ userId, nuevoStatus, notas })
            });

            if (res.ok) {
                alert("Estado actualizado correctamente");
                fetchPendientes();
            } else {
                alert("Error al actualizar");
            }
        }

        // Carga inicial
        fetchPendientes();
    </script>
</body>
</html>
