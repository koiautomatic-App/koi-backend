<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>KOI · Facturación</title>

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet"/>

  <!-- Icons -->
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet"/>

  <!-- Chart -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>

  <style>
    body {
      background:#080810;
      color:#fff;
      font-family:'Plus Jakarta Sans',sans-serif;
      padding:20px;
    }

    .mono-amount { font-size:28px; margin-bottom:10px; }
    .prog-fill { height:6px; background:#00e676; width:0%; margin-bottom:10px; }
    .prog-pct { margin-bottom:20px; }

    .metric { margin-bottom:10px; }

    .comp-scroll { margin-top:20px; }
    .comp-row {
      display:flex;
      justify-content:space-between;
      border-bottom:1px solid #222;
      padding:10px 0;
    }

    canvas { margin-top:20px; }
  </style>
</head>

<body>

  <h1>KOI Dashboard</h1>

  <!-- MONOTRIBUTO -->
  <div class="mono-amount">$0</div>
  <div class="prog-fill"></div>
  <div class="prog-pct">0%</div>

  <!-- METRICAS -->
  <div class="metric mc-today">Hoy: <span class="mc-value">$0</span></div>
  <div class="metric mc-pend">Ventas: <span class="mc-value">0</span></div>

  <!-- TABLA -->
  <div class="comp-scroll"></div>

  <!-- CHART -->
  <canvas id="incomeChart"></canvas>

  <script>
    let incomeChart;

    function initChart() {
      const ctx = document.getElementById('incomeChart');

      incomeChart = new Chart(ctx, {
        type: 'line',
        data: {
          labels: ['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'],
          datasets: [{
            label: 'Ingresos',
            data: [0,0,0,0,0,0,0],
            borderWidth: 2
          }]
        }
      });
    }

    async function fetchDashboardData() {
      try {
        const response = await fetch('/api/stats/dashboard');

        if (!response.ok) {
          throw new Error('Error server');
        }

        const data = await response.json();

        console.log("📊 DATA:", data);

        if (!data.ok) throw new Error('Backend inválido');

        // MONTO
        const total = Number(data.totalFacturadoMes) || 0;

        document.querySelector('.mono-amount').innerHTML =
          `<span>$</span>${total.toLocaleString('es-AR')}`;

        // PROGRESO
        const limite = 6400000;
        const pct = (total / limite) * 100;

        document.querySelector('.prog-fill').style.width =
          `${Math.min(pct,100)}%`;

        document.querySelector('.prog-pct').innerText =
          `${pct.toFixed(1)}%`;

        // METRICAS
        document.querySelector('.mc-today .mc-value').innerText =
          `$${total.toLocaleString('es-AR')}`;

        document.querySelector('.mc-pend .mc-value').innerText =
          Number(data.totalVentas) || 0;

        // TABLA
        const container = document.querySelector('.comp-scroll');
        container.innerHTML = '';

        if (!data.ventas || data.ventas.length === 0) {
          container.innerHTML = `<p>No hay ventas</p>`;
        } else {
          data.ventas.forEach(v => {
            const amount = Number(v.amount) || 0;
            const date = new Date(v.createdAt);

            const row = document.createElement('div');
            row.className = 'comp-row';

            row.innerHTML = `
              <span>${v.customerName || 'Cliente'}</span>
              <span>${date.toLocaleDateString()}</span>
              <span>$${amount.toLocaleString('es-AR')}</span>
            `;

            container.appendChild(row);
          });
        }

        // CHART
        if (data.semanal && incomeChart) {
          incomeChart.data.datasets[0].data =
            data.semanal.map(n => Number(n) || 0);

          incomeChart.update();
        }

      } catch (err) {
        console.error("❌ Error:", err);

        document.querySelector('.comp-scroll').innerHTML =
          `<p style="color:red;">Error cargando datos</p>`;
      }
    }

    document.addEventListener('DOMContentLoaded', () => {
      initChart();
      fetchDashboardData();
    });
  </script>

</body>
</html>
