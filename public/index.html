<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>KOI · Facturación</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>

  <style>
    :root {
      --bg:           #080810;
      --bg-2:         #0d0d1a;
      --surface:      #111120;
      --card:         #13131f;
      --card-2:       #17172a;
      --border:       rgba(255,255,255,0.055);
      --border-2:     rgba(255,255,255,0.09);
      --green:        #00e676;
      --green-dim:    #00c853;
      --yellow:       #ffd600;
      --red:          #ff5252;
      --text-main:    #ffffff;
      --text-dim:     rgba(255,255,255,0.5);
      --text-soft:    rgba(255,255,255,0.3);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
    body { background: var(--bg); color: var(--text-main); -webkit-font-smoothing: antialiased; overflow-x: hidden; }

    .dashboard { display: grid; grid-template-columns: 1fr 380px; gap: 24px; padding: 24px; max-width: 1600px; margin: 0 auto; }

    /* Cards & Glass */
    .card { background: var(--card); border: 1px solid var(--border); border-radius: 28px; padding: 28px; position: relative; overflow: hidden; }
    
    /* Monotributo Card */
    .mono-card { grid-column: 1 / -1; display: flex; justify-content: space-between; align-items: center; padding: 32px 40px; background: linear-gradient(135deg, #13131f 0%, #1a1a2e 100%); border: 1px solid var(--border-2); }
    .mono-info h2 { font-size: 13px; text-transform: uppercase; letter-spacing: 2.5px; color: var(--text-dim); margin-bottom: 12px; font-weight: 700; }
    .mono-amount { font-family: 'Space Grotesk'; font-size: 56px; font-weight: 700; letter-spacing: -2px; line-height: 1; }
    .mono-amount span { font-size: 20px; color: var(--text-soft); font-weight: 500; margin-left: 8px; letter-spacing: 0; }
    
    .mono-progress { width: 340px; }
    .prog-track { height: 10px; background: rgba(255,255,255,0.04); border-radius: 20px; overflow: hidden; margin-bottom: 12px; border: 1px solid rgba(255,255,255,0.03); }
    .prog-fill { height: 100%; background: var(--green); border-radius: 20px; transition: width 1.5s cubic-bezier(0.34, 1.56, 0.64, 1); }
    .prog-fill.warn { background: var(--yellow); }
    .prog-fill.crit { background: var(--red); }
    .prog-labels { display: flex; justify-content: space-between; font-size: 13px; font-weight: 600; }
    .prog-pct { color: var(--text-main); }
    .prog-cap { color: var(--text-dim); }

    /* Left Side */
    .main-content { display: flex; flex-direction: column; gap: 24px; }
    .chart-container { height: 320px; width: 100%; margin-top: 20px; }

    /* Stats Grid */
    .stats-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; margin-top: 10px; }
    .metric-card { background: var(--card-2); padding: 24px; border-radius: 24px; border: 1px solid var(--border); transition: transform 0.3s ease; }
    .metric-card:hover { transform: translateY(-5px); border-color: var(--border-2); }
    .mc-label { font-size: 13px; color: var(--text-dim); margin-bottom: 8px; font-weight: 600; display: flex; align-items: center; gap: 8px; }
    .mc-value { font-size: 32px; font-weight: 700; font-family: 'Space Grotesk'; letter-spacing: -1px; }

    /* Right Side: Comprobantes */
    .comp-section { display: flex; flex-direction: column; height: 100%; }
    .comp-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
    .comp-header h3 { font-size: 18px; font-weight: 700; }
    .btn-config { background: var(--card-2); border: 1px solid var(--border-2); color: var(--text-main); padding: 10px; border-radius: 14px; cursor: pointer; transition: all 0.2s; }
    .btn-config:hover { background: var(--surface); border-color: var(--text-dim); }

    .comp-scroll { display: flex; flex-direction: column; gap: 14px; overflow-y: auto; max-height: 600px; padding-right: 10px; }
    .comp-row { display: flex; align-items: center; justify-content: space-between; padding: 18px; background: var(--card-2); border-radius: 20px; border: 1px solid var(--border); transition: all 0.2s; cursor: pointer; }
    .comp-row:hover { background: var(--surface); border-color: var(--border-2); }
    
    .comp-info { display: flex; align-items: center; gap: 18px; }
    .comp-dot { width: 10px; height: 10px; border-radius: 50%; }
    .cae-ok { background: var(--green); box-shadow: 0 0 15px rgba(0, 230, 118, 0.4); }
    .cae-pend { background: var(--yellow); box-shadow: 0 0 15px rgba(255, 214, 0, 0.3); }
    .cae-err { background: var(--red); box-shadow: 0 0 15px rgba(255, 82, 82, 0.3); }

    .comp-det p { line-height: 1.4; }
    .comp-name { font-weight: 700; font-size: 15px; color: var(--text-main); }
    .comp-date { font-size: 12px; color: var(--text-dim); font-weight: 500; }
    .comp-price { font-family: 'Space Grotesk'; font-weight: 700; font-size: 16px; color: var(--text-main); }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border-2); border-radius: 10px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--text-soft); }

    /* Sidebar Config */
    .cfg-panel { position: fixed; right: -400px; top: 0; width: 400px; height: 100vh; background: var(--surface); border-left: 1px solid var(--border-2); z-index: 100; padding: 40px; transition: right 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
    .cfg-panel.open { right: 0; }
    .cfg-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(4px); z-index: 99; opacity: 0; pointer-events: none; transition: opacity 0.3s; }
    .cfg-overlay.open { opacity: 1; pointer-events: auto; }

    @media (max-width: 1100px) {
      .dashboard { grid-template-columns: 1fr; }
      .mono-card { flex-direction: column; gap: 24px; align-items: flex-start; }
      .mono-progress { width: 100%; }
    }
  </style>
</head>
<body>

  <div class="dashboard">
    <div class="card mono-card">
      <div class="mono-info">
        <h2>Facturación Acumulada</h2>
        <div class="mono-amount"><span>$</span>0</div>
      </div>
      <div class="mono-progress">
        <div class="prog-track">
          <div class="prog-fill" style="width: 0%"></div>
        </div>
        <div class="prog-labels">
          <span class="prog-pct">0%</span>
          <span class="prog-cap">Cat. Vigente</span>
        </div>
      </div>
    </div>

    <div class="main-content">
      <div class="card">
        <div style="display: flex; justify-content: space-between; align-items: center;">
          <h3 style="font-size: 18px;">Ingresos Semanales</h3>
          <div style="font-size: 12px; color: var(--text-dim); display: flex; gap: 12px;">
            <span style="display: flex; align-items: center; gap: 4px;"><i style="width: 8px; height: 8px; background: var(--green); border-radius: 50%; display: inline-block;"></i> Real</span>
          </div>
        </div>
        <div class="chart-container">
          <canvas id="incomeChart"></canvas>
        </div>
        
        <div class="stats-grid">
          <div class="metric-card mc-today">
            <div class="mc-label"><span class="material-icons" style="font-size: 16px; color: var(--green);">trending_up</span>Ventas del Mes</div>
            <div class="mc-value">$0</div>
          </div>
          <div class="metric-card mc-pend">
            <div class="mc-label"><span class="material-icons" style="font-size: 16px; color: var(--yellow);">history_toggle_off</span>Cant. Órdenes</div>
            <div class="mc-value">0</div>
          </div>
        </div>
      </div>
    </div>

    <div class="card comp-section">
      <div class="comp-header">
        <h3>Ventas Reales</h3>
        <button class="btn-config" onclick="toggleConfig()">
          <span class="material-icons">settings</span>
        </button>
      </div>
      <div class="comp-scroll">
        <p style="text-align: center; color: var(--text-soft); margin-top: 20px;">Sincronizando con Woo...</p>
      </div>
    </div>
  </div>

  <div class="cfg-overlay" onclick="toggleConfig()"></div>
  <div class="cfg-panel">
    <h2 style="margin-bottom: 30px;">Configuración</h2>
    <div style="display: flex; flex-direction: column; gap: 24px;">
      <div>
        <p style="font-size: 12px; color: var(--text-dim); margin-bottom: 10px; text-transform: uppercase; letter-spacing: 1px;">Conexión ARCA</p>
        <div style="background: var(--card-2); padding: 16px; border-radius: 16px; border: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between;">
          <span style="font-size: 14px;">Estado del WebService</span>
          <span style="color: var(--green); font-size: 12px; font-weight: 700;">ACTIVO</span>
        </div>
      </div>
    </div>
  </div>

  <script>
    let incomeChart;

    function initChart() {
      const ctx = document.getElementById('incomeChart').getContext('2d');
      const gradient = ctx.createLinearGradient(0, 0, 0, 400);
      gradient.addColorStop(0, 'rgba(0, 230, 118, 0.15)');
      gradient.addColorStop(1, 'rgba(0, 230, 118, 0)');

      incomeChart = new Chart(ctx, {
        type: 'line',
        data: {
          labels: ['Lun', 'Mar', 'Mie', 'Jue', 'Vie', 'Sab', 'Dom'],
          datasets: [{
            label: 'Ventas',
            data: [0, 0, 0, 0, 0, 0, 0],
            borderColor: '#00e676',
            borderWidth: 4,
            pointBackgroundColor: '#00e676',
            pointBorderColor: 'rgba(255,255,255,0.1)',
            pointRadius: 0,
            pointHoverRadius: 6,
            tension: 0.45,
            fill: true,
            backgroundColor: gradient
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: { legend: { display: false } },
          scales: {
            y: { grid: { display: false }, ticks: { display: false }, border: { display: false } },
            x: { grid: { color: 'rgba(255,255,255,0.03)' }, ticks: { color: 'rgba(255,255,255,0.3)', font: { size: 11 } } }
          }
        }
      });
    }

    // LÓGICA DE CONEXIÓN CON EL SERVER (DATOS DE WOOCOMMERCE)
    async function fetchDashboardData() {
      try {
        const response = await fetch('/api/stats/dashboard');
        const data = await response.json();

        if (data.ok) {
          // 1. Actualizar Facturación Acumulada
          const total = data.totalFacturadoMes || 0;
          document.querySelector('.mono-amount').innerHTML = `<span>$</span>${total.toLocaleString('es-AR')}`;
          
          // 2. Actualizar Barra de Monotributo (Asumiendo límite de Cat. H o similar para el ejemplo)
          const limite = 6400000; 
          const pct = Math.min((total / limite) * 100, 100);
          const fill = document.querySelector('.prog-fill');
          fill.style.width = `${pct}%`;
          document.querySelector('.prog-pct').innerText = `${pct.toFixed(1)}%`;
          
          if(pct > 80) fill.classList.add('warn');
          if(pct > 95) fill.classList.add('crit');

          // 3. Métricas Rápidas
          document.querySelector('.mc-today .mc-value').innerText = `$${total.toLocaleString('es-AR')}`;
          document.querySelector('.mc-pend .mc-value').innerText = data.totalVentas || 0;

          // 4. Inyectar Ventas Reales en la tabla
          const container = document.querySelector('.comp-scroll');
          if (container && data.ventas) {
            container.innerHTML = ''; 

            data.ventas.forEach(orden => {
              let statusClass = 'cae-pend';
              if (orden.status === 'invoiced') statusClass = 'cae-ok';
              if (orden.status === 'error') statusClass = 'cae-err';

              const row = document.createElement('div');
              row.className = 'comp-row';
              row.innerHTML = `
                <div class="comp-info">
                  <div class="comp-dot ${statusClass}"></div>
                  <div class="comp-det">
                    <p class="comp-name">${orden.customerName || 'Cliente'}</p>
                    <p class="comp-date">${new Date(orden.createdAt).toLocaleDateString()} · WooCommerce</p>
                  </div>
                </div>
                <p class="comp-price">$${orden.amount.toLocaleString('es-AR')}</p>
              `;
              container.appendChild(row);
            });
          }

          // 5. Gráfico (Si el server envía array 'semanal')
          if(data.semanal) {
              incomeChart.data.datasets[0].data = data.semanal;
              incomeChart.update();
          }
        }
      } catch (err) {
        console.error("Error al sincronizar datos:", err);
      }
    }

    function toggleConfig() {
      document.querySelector('.cfg-panel').classList.toggle('open');
      document.querySelector('.cfg-overlay').classList.toggle('open');
    }

    window.addEventListener('load', () => {
      initChart();
      fetchDashboardData();
      // Auto-refresco cada 5 minutos
      setInterval(fetchDashboardData, 300000);
    });
  </script>
</body>
</html>
