<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>KOI Dashboard</title>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0b0b14;
      color: #fff;
    }

    header {
      padding: 15px;
      background: #121225;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .status {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: orange;
    }

    .dot.online { background: #00e676; }
    .dot.offline { background: red; }

    .container {
      padding: 20px;
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 15px;
    }

    .card {
      background: #181830;
      padding: 15px;
      border-radius: 10px;
    }

    canvas {
      margin-top: 20px;
      background: #181830;
      padding: 10px;
      border-radius: 10px;
    }

    button {
      padding: 8px 12px;
      border: none;
      background: #00e676;
      color: black;
      cursor: pointer;
      border-radius: 6px;
    }
  </style>
</head>

<body>

<header>
  <h2>KOI Facturación</h2>
  <div class="status">
    <div class="dot" id="statusDot"></div>
    <span id="statusText">Checking...</span>
  </div>
</header>

<div class="container">

  <div class="cards">
    <div class="card">
      <h4>Hoy</h4>
      <p id="today">$0</p>
    </div>

    <div class="card">
      <h4>Mes</h4>
      <p id="month">$0</p>
    </div>

    <div class="card">
      <h4>Órdenes</h4>
      <p id="ordersCount">0</p>
    </div>
  </div>

  <canvas id="chart" height="100"></canvas>

  <br>
  <button onclick="loadData()">Actualizar</button>

</div>

<script>
/* =========================
   CONFIG API (Render Ready)
========================= */
const API = '';

async function apiFetch(path, options = {}) {
  return fetch(API + path, {
    credentials: 'include',
    headers: {
      'Content-Type': 'application/json'
    },
    ...options
  });
}

/* =========================
   AUTH CHECK
========================= */
async function checkAuth() {
  try {
    const res = await apiFetch('/api/auth/me');
    if (!res.ok) throw new Error();

    const user = await res.json();
    console.log('User:', user);

  } catch {
    alert('No autenticado');
  }
}

/* =========================
   SERVER STATUS
========================= */
async function checkServer() {
  const dot = document.getElementById('statusDot');
  const text = document.getElementById('statusText');

  try {
    const res = await fetch('/api/health');

    if (res.ok) {
      dot.className = 'dot online';
      text.textContent = 'Online';
    } else {
      throw new Error();
    }

  } catch {
    dot.className = 'dot offline';
    text.textContent = 'Offline';
  }
}

setInterval(checkServer, 10000);
checkServer();

/* =========================
   LOAD DATA
========================= */
let chart;

async function loadData() {
  try {
    const res = await apiFetch('/api/orders');
    const orders = await res.json();

    document.getElementById('ordersCount').textContent = orders.length;

    let today = 0;
    let month = 0;

    const now = new Date();

    orders.forEach(o => {
      const amount = o.amount || 0;
      const date = new Date(o.createdAt);

      if (date.toDateString() === now.toDateString()) {
        today += amount;
      }

      if (
        date.getMonth() === now.getMonth() &&
        date.getFullYear() === now.getFullYear()
      ) {
        month += amount;
      }
    });

    document.getElementById('today').textContent = '$' + today;
    document.getElementById('month').textContent = '$' + month;

    drawChart(orders);

  } catch (err) {
    console.error(err);
  }
}

/* =========================
   CHART
========================= */
function drawChart(orders) {
  const data = {};

  orders.forEach(o => {
    const d = new Date(o.createdAt).toLocaleDateString();
    data[d] = (data[d] || 0) + (o.amount || 0);
  });

  const labels = Object.keys(data);
  const values = Object.values(data);

  if (chart) chart.destroy();

  chart = new Chart(document.getElementById('chart'), {
    type: 'line',
    data: {
      labels,
      datasets: [{
        label: 'Ventas',
        data: values
      }]
    }
  });
}

/* =========================
   INIT
========================= */
checkAuth();
loadData();

</script>

</body>
</html>
