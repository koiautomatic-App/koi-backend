<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>KOI · Facturación</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet"/>
  
  <style>
    /* Restaurando colores y fuentes de tu diseño original */
    :root {
      --bg: #0a0a12; 
      --card: #11111e;
      --orange: #e8622a;
      --green: #00e676;
      --text-main: #ffffff;
      --text-dim: #8888aa;
      --border: rgba(255,255,255,0.08);
    }

    body { 
      background: var(--bg); 
      color: var(--text-main); 
      font-family: 'Plus Jakarta Sans', sans-serif; 
      margin: 0;
    }

    .shell { display: flex; min-height: 100vh; }

    /* Sidebar con tu estilo */
    .sidebar { 
      width: 240px; 
      background: #0d0d1a; 
      border-right: 1px solid var(--border);
      padding: 30px 0;
    }

    .logo-container {
      padding: 0 25px 30px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo-icon {
      width: 40px;
      height: 40px;
      background: linear-gradient(135deg, var(--orange), #f5a623);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
    }

    /* Main Content Area */
    .main { flex: 1; padding: 30px; }

    .header-box { margin-bottom: 35px; }
    .header-box h1 { font-size: 24px; font-weight: 700; margin-bottom: 5px; }
    .header-box p { color: var(--text-dim); font-size: 14px; }

    /* Metrics Cards */
    .grid-metrics {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
      margin-bottom: 35px;
    }

    .card-metric {
      background: var(--card);
      border: 1px solid var(--border);
      padding: 25px;
      border-radius: 20px;
    }

    .metric-title { 
      font-size: 11px; 
      text-transform: uppercase; 
      letter-spacing: 1px; 
      color: var(--text-dim);
      margin-bottom: 10px;
    }

    .metric-value { 
      font-family: 'Space Grotesk', sans-serif; 
      font-size: 32px; 
      font-weight: 700; 
    }

    /* Table Style */
    .transactions-box {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 20px;
    }

    .table-header {
      padding: 10px 15px 20px;
      border-bottom: 1px solid var(--border);
      font-weight: 600;
    }

    .row-item {
      display: flex;
      align-items: center;
      padding: 20px 15px;
      border-bottom: 1px solid rgba(255,255,255,0.03);
    }

    .status-indicator {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      margin-right: 20px;
    }

    .st-pending { background: #ffb300; box-shadow: 0 0 10px rgba(255,179,0,0.4); }
    .st-success { background: var(--green); box-shadow: 0 0 10px rgba(0,230,118,0.4); }

    .col-info { flex: 1; }
    .col-amount { font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 16px; }

    .client-name { font-weight: 600; font-size: 15px; margin-bottom: 4px; }
    .client-detail { color: var(--text-dim); font-size: 12px; }

  </style>
</head>
<body>

  <div class="shell">
    <div class="sidebar">
      <div class="logo-container">
        <div class="logo-icon">🐟</div>
        <div>
          <div style="font-weight:800; font-size:18px; letter-spacing:-0.5px">KOI</div>
          <div style="font-size:10px; color:var(--text-dim); font-weight:600">FACTURACIÓN</div>
        </div>
      </div>
      </div>

    <div class="main">
      <div class="header-box">
        <h1>Panel de Control</h1>
        <p>Monitoreo de ventas de sonohandmade.com</p>
      </div>

      <div class="grid-metrics">
        <div class="card-metric">
          <div class="metric-title">Ventas Hoy</div>
          <div class="metric-value" id="hoy-val">$0</div>
        </div>
        <div class="card-metric">
          <div class="metric-title">Pendientes</div>
          <div class="metric-value" id="pend-val">0</div>
        </div>
        <div class="card-metric">
          <div class="metric-title">Estado Sistema</div>
          <div class="metric-value" style="color:var(--green); font-size:18px">ONLINE</div>
        </div>
      </div>

      <div class="transactions-box">
        <div class="table-header">Últimas Transacciones</div>
        <div id="lista-ventas">
          </div>
      </div>
    </div>
  </div>

  <script>
    async function actualizarDashboard() {
      try {
        const res = await fetch('/api/orders');
        const orders = await res.json();
        
        const container = document.getElementById('lista-ventas');
        
        // Totales
        const hoyStr = new Date().toLocaleDateString();
        const sumaHoy = orders
          .filter(o => new Date(o.createdAt).toLocaleDateString() === hoyStr)
          .reduce((acc, o) => acc + o.amount, 0);
        
        const numPend = orders.filter(o => o.status === 'pending_invoice').length;

        document.getElementById('hoy-val').innerText = `$${sumaHoy.toLocaleString('es-AR')}`;
        document.getElementById('pend-val').innerText = numPend;

        // Lista
        container.innerHTML = orders.map(o => `
          <div class="row-item">
            <div class="status-indicator ${o.status === 'success' ? 'st-success' : 'st-pending'}"></div>
            <div class="col-info">
              <div class="client-name">${o.customerName}</div>
              <div class="client-detail">DNI: ${o.customerDoc || 'N/A'} • ${new Date(o.createdAt).toLocaleDateString()}</div>
            </div>
            <div class="col-amount">$${o.amount.toLocaleString('es-AR')}</div>
          </div>
        `).join('');

      } catch (e) {
        console.error("Error KOI:", e);
      }
    }

    actualizarDashboard();
    setInterval(actualizarDashboard, 20000);
  </script>
</body>
</html>
