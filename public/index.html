<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>KOI · Facturación</title>
</head>

<body>

<script>
/* ─────────────────────────────
   FETCH DASHBOARD (FIX REAL)
───────────────────────────── */
async function fetchDashboardData() {
  try {
    const response = await fetch('/api/stats/dashboard');

    if (!response.ok) throw new Error('Error server');

    const data = await response.json();
    console.log("📊 DATA:", data);

    if (!data.ok) throw new Error('Backend inválido');

    // ─────────────────────────────
    // 1. TOTAL FACTURADO
    // ─────────────────────────────
    const total = Number(data.totalFacturadoMes) || 0;

    const mono = document.querySelector('.mono-amount');
    if (mono) {
      mono.innerHTML = `<span>$</span>${total.toLocaleString('es-AR')}`;
    }

    // ─────────────────────────────
    // 2. PROGRESO
    // ─────────────────────────────
    const limite = 6400000;
    const pct = (total / limite) * 100;

    const fill = document.querySelector('.prog-fill');
    if (fill) fill.style.width = `${Math.min(pct, 100)}%`;

    const pctEl = document.querySelector('.prog-pct');
    if (pctEl) pctEl.innerText = `${pct.toFixed(1)}%`;

    // ─────────────────────────────
    // 3. MÉTRICAS
    // ─────────────────────────────
    const todayEl = document.querySelector('.mc-today .mc-value');
    if (todayEl) {
      todayEl.innerText = `$${total.toLocaleString('es-AR')}`;
    }

    const pendEl = document.querySelector('.mc-pend .mc-value');
    if (pendEl) {
      pendEl.innerText = Number(data.totalVentas) || 0;
    }

    // ─────────────────────────────
    // 4. 🧠 CLAVE: ADAPTAR DATOS A KOI
    // ─────────────────────────────
    const lista = (data.ventas || []).map(v => ({
      cliente: v.customerName || 'Cliente',
      fecha: new Date(v.createdAt).toLocaleDateString(),
      monto: Number(v.amount) || 0,
      estado: v.status === 'invoiced' ? 'cae-ok' : 'cae-pend',
      tipo: 'Woo',
      id: v._id || Math.random()
    }));

    // ✅ USAR TU RENDER ORIGINAL (NO ROMPE CSS)
    if (typeof renderComps === 'function') {
      renderComps(lista);
    }

    // ─────────────────────────────
    // 5. GRÁFICO
    // ─────────────────────────────
    if (data.semanal && typeof incomeChart !== 'undefined') {
      incomeChart.data.datasets[0].data =
        data.semanal.map(n => Number(n) || 0);

      incomeChart.update();
    }

  } catch (error) {
    console.error("❌ Error:", error);

    if (typeof renderComps === 'function') {
      renderComps([]);
    }
  }
}

/* ─────────────────────────────
   INIT LIMPIO (SIN DUPLICADOS)
───────────────────────────── */
document.addEventListener('DOMContentLoaded', () => {
  initChart();

  // ❌ NO usar MOCK
  // ❌ NO usar cargarDashboard()

  // ✅ SOLO ESTO
  fetchDashboardData();

  if (typeof renderStatus === 'function') {
    renderStatus(true);
  }
});
</script>

</body>
</html>
