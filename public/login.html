<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>KOI · Acceso</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg:        #080810;
      --bg-2:      #0d0d1a;
      --card:      #13131f;
      --card-2:    #17172a;
      --border:    rgba(255,255,255,.07);
      --border-2:  rgba(255,255,255,.12);
      --orange:    #e8622a;
      --orange-2:  #f5a623;
      --green:     #00e676;
      --text-1:    #f0f0fa;
      --text-2:    #8888aa;
      --text-3:    #44445a;
      --red:       #ff3d57;
      --r-sm: 8px; --r-md: 14px; --r-lg: 18px; --r-xl: 24px;
      --font: 'Plus Jakarta Sans', sans-serif;
      --font-num: 'Space Grotesk', sans-serif;
    }
    *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
    html, body { height:100%; }

    body {
      background:var(--bg);
      font-family:var(--font);
      color:var(--text-1);
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:20px;
      position:relative;
      overflow:hidden;
    }

    /* Fondo animado */
    .bg-glow {
      position:fixed; pointer-events:none;
    }
    .bg-glow-1 {
      width:600px; height:600px; border-radius:50%;
      background:radial-gradient(circle, rgba(232,98,42,.08) 0%, transparent 65%);
      top:-200px; left:-150px; animation:drift1 14s ease-in-out infinite;
    }
    .bg-glow-2 {
      width:500px; height:500px; border-radius:50%;
      background:radial-gradient(circle, rgba(0,230,118,.06) 0%, transparent 65%);
      bottom:-150px; right:-100px; animation:drift2 18s ease-in-out infinite;
    }
    .bg-glow-3 {
      width:300px; height:300px; border-radius:50%;
      background:radial-gradient(circle, rgba(245,166,35,.05) 0%, transparent 65%);
      top:50%; left:60%; animation:drift3 22s ease-in-out infinite;
    }
    @keyframes drift1 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(40px,30px)} }
    @keyframes drift2 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(-30px,-40px)} }
    @keyframes drift3 { 0%,100%{transform:translate(0,0)} 33%{transform:translate(-20px,20px)} 66%{transform:translate(20px,-15px)} }

    /* Grid de puntos */
    body::before {
      content:'';
      position:fixed; inset:0; pointer-events:none;
      background-image:radial-gradient(circle, rgba(255,255,255,.03) 1px, transparent 1px);
      background-size:28px 28px;
      mask-image:radial-gradient(ellipse 80% 80% at 50% 50%, black 30%, transparent 100%);
    }

    /* CARD PRINCIPAL */
    .login-card {
      width:100%; max-width:420px;
      background:var(--card);
      border:1px solid var(--border);
      border-radius:var(--r-xl);
      box-shadow:0 32px 80px rgba(0,0,0,.6), 0 0 0 1px rgba(232,98,42,.06);
      overflow:hidden;
      animation:cardIn .5s cubic-bezier(.34,1.56,.64,1) both;
      position:relative;
    }
    @keyframes cardIn {
      from { opacity:0; transform:translateY(24px) scale(.97); }
      to   { opacity:1; transform:translateY(0) scale(1); }
    }

    /* Accent line top */
    .card-accent {
      height:3px;
      background:linear-gradient(90deg, var(--orange), var(--orange-2), var(--green));
    }

    /* HEADER */
    .card-header {
      padding:32px 36px 24px;
      text-align:center;
      border-bottom:1px solid var(--border);
    }
    .logo-wrap {
      display:inline-flex; align-items:center; justify-content:center;
      gap:12px; margin-bottom:20px;
    }
    .logo-fish {
      width:48px; height:48px;
      background:linear-gradient(135deg, #080810, #13131f);
      border:1px solid rgba(232,98,42,.3);
      border-radius:14px;
      display:flex; align-items:center; justify-content:center;
      box-shadow:0 0 24px rgba(232,98,42,.2);
    }
    .logo-text {
      text-align:left;
    }
    .logo-name {
      font-family:var(--font-num); font-size:22px; font-weight:700;
      letter-spacing:-.5px; color:var(--text-1);
    }
    .logo-sub {
      font-size:9px; font-weight:600; letter-spacing:2px;
      text-transform:uppercase; color:var(--text-3); margin-top:2px;
    }
    .card-title {
      font-size:18px; font-weight:700; color:var(--text-1);
      margin-bottom:6px; letter-spacing:-.3px;
    }
    .card-desc {
      font-size:12px; color:var(--text-2); line-height:1.6;
    }

    /* TABS */
    .tabs {
      display:flex; border-bottom:1px solid var(--border);
    }
    .tab {
      flex:1; padding:14px; text-align:center;
      font-size:12px; font-weight:700; letter-spacing:.5px;
      text-transform:uppercase; color:var(--text-3);
      cursor:pointer; border:none; background:none;
      transition:all .18s; position:relative;
    }
    .tab:hover { color:var(--text-2); }
    .tab.active { color:var(--orange-2); }
    .tab.active::after {
      content:''; position:absolute; bottom:-1px; left:20%; right:20%;
      height:2px; background:linear-gradient(90deg,var(--orange),var(--orange-2));
      border-radius:2px;
    }

    /* BODY */
    .card-body { padding:28px 36px 32px; }

    .form-panel { display:none; animation:fadeIn .2s ease; }
    .form-panel.active { display:block; }
    @keyframes fadeIn { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }

    /* GOOGLE BTN */
    .btn-google {
      width:100%; display:flex; align-items:center; justify-content:center; gap:10px;
      padding:12px 20px; border-radius:var(--r-sm);
      background:rgba(255,255,255,.06); border:1px solid rgba(255,255,255,.12);
      color:var(--text-1); font-family:var(--font); font-weight:600; font-size:13px;
      cursor:pointer; transition:all .18s; text-decoration:none;
      margin-bottom:20px;
    }
    .btn-google:hover {
      background:rgba(255,255,255,.1); border-color:rgba(255,255,255,.2);
      transform:translateY(-1px);
    }
    .btn-google svg { flex-shrink:0; }

    .divider {
      display:flex; align-items:center; gap:12px; margin-bottom:20px;
      color:var(--text-3); font-size:11px; font-weight:600; letter-spacing:1px;
    }
    .divider::before, .divider::after {
      content:''; flex:1; height:1px; background:var(--border);
    }

    /* FORM FIELDS */
    .field { margin-bottom:14px; }
    .field label {
      display:block; font-size:10px; font-weight:700;
      letter-spacing:1.5px; text-transform:uppercase;
      color:var(--text-3); margin-bottom:6px;
    }
    .field input {
      width:100%; background:var(--card-2);
      border:1px solid var(--border); border-radius:var(--r-sm);
      color:var(--text-1); font-family:var(--font); font-size:13px;
      padding:11px 14px; outline:none; transition:all .18s;
    }
    .field input::placeholder { color:var(--text-3); }
    .field input:focus {
      border-color:rgba(232,98,42,.45);
      box-shadow:0 0 0 3px rgba(232,98,42,.09);
      background:var(--bg-2);
    }
    .field input.error { border-color:rgba(255,61,87,.5); }

    .field-row { display:grid; grid-template-columns:1fr 1fr; gap:10px; }

    /* SUBMIT BTN */
    .btn-submit {
      width:100%; display:flex; align-items:center; justify-content:center; gap:8px;
      padding:13px 24px; border-radius:var(--r-sm); border:none;
      background:linear-gradient(135deg, var(--orange), var(--orange-2));
      color:#fff; font-family:var(--font); font-weight:700; font-size:14px;
      cursor:pointer; transition:all .2s; margin-top:6px;
      box-shadow:0 6px 20px rgba(232,98,42,.35); letter-spacing:.2px;
    }
    .btn-submit:hover {
      transform:translateY(-2px);
      box-shadow:0 10px 28px rgba(232,98,42,.5);
      filter:brightness(1.08);
    }
    .btn-submit:active { transform:scale(.98); }
    .btn-submit:disabled { opacity:.5; pointer-events:none; }

    /* LOADING SPINNER */
    .btn-spinner {
      width:16px; height:16px; border-radius:50%;
      border:2px solid rgba(255,255,255,.3); border-top-color:#fff;
      animation:spin .65s linear infinite; display:none;
    }
    @keyframes spin { to { transform:rotate(360deg); } }

    /* MESSAGES */
    .msg {
      padding:10px 14px; border-radius:var(--r-sm);
      font-size:12px; font-weight:500; margin-bottom:14px;
      display:none; align-items:center; gap:8px;
    }
    .msg.error { display:flex; background:rgba(255,61,87,.08); border:1px solid rgba(255,61,87,.2); color:#ff6b7a; }
    .msg.success { display:flex; background:rgba(0,230,118,.06); border:1px solid rgba(0,230,118,.18); color:var(--green); }

    /* PASSWORD TOGGLE */
    .pass-wrap { position:relative; }
    .pass-wrap input { padding-right:40px; }
    .pass-toggle {
      position:absolute; right:12px; top:50%; transform:translateY(-50%);
      background:none; border:none; color:var(--text-3); cursor:pointer;
      padding:4px; display:flex; align-items:center; transition:color .15s;
    }
    .pass-toggle:hover { color:var(--text-2); }

    /* TERMS */
    .terms {
      font-size:10px; color:var(--text-3); text-align:center;
      margin-top:16px; line-height:1.6;
    }
    .terms a { color:var(--orange-2); text-decoration:none; }
    .terms a:hover { text-decoration:underline; }

    /* FOOTER */
    .card-footer {
      padding:14px 36px 20px;
      border-top:1px solid var(--border);
      text-align:center;
    }
    .card-footer-brand {
      font-size:10px; font-weight:800; letter-spacing:2px;
      text-transform:uppercase; color:var(--text-3);
    }
    .card-footer-sub {
      font-size:9px; color:var(--text-3); margin-top:2px;
      letter-spacing:.5px;
    }

    /* RESPONSIVE */
    @media (max-width:480px) {
      .login-card { border-radius:var(--r-lg); }
      .card-header { padding:24px 24px 20px; }
      .card-body { padding:22px 24px 26px; }
      .card-footer { padding:12px 24px 16px; }
      .field-row { grid-template-columns:1fr; gap:0; }
    }
  </style>
</head>
<body>

  <div class="bg-glow bg-glow-1"></div>
  <div class="bg-glow bg-glow-2"></div>
  <div class="bg-glow bg-glow-3"></div>

  <div class="login-card">
    <div class="card-accent"></div>

    <!-- HEADER -->
    <div class="card-header">
      <div class="logo-wrap">
        <div class="logo-fish">
          <svg width="26" height="26" viewBox="0 0 20 20" fill="none">
            <path d="M15.5 5C14 3.5 11.5 3 9 4.5c-1.5.9-2.8 2.2-3.5 3.5H2l2.5 2-2.5 2h3.5c.7 1.3 2 2.6 3.5 3.5C11.5 17 14 16.5 15.5 15L18 10l-2.5-5z" fill="url(#fishGrad)"/>
            <circle cx="13.5" cy="8.5" r="0.9" fill="#08081099"/>
            <defs>
              <linearGradient id="fishGrad" x1="2" y1="5" x2="18" y2="15" gradientUnits="userSpaceOnUse">
                <stop stop-color="#e8622a"/>
                <stop offset=".55" stop-color="#f5a623"/>
                <stop offset="1" stop-color="#00e676"/>
              </linearGradient>
            </defs>
          </svg>
        </div>
        <div class="logo-text">
          <div class="logo-name">KOI-FACTURA</div>
          <div class="logo-sub">Sistema de Facturación</div>
        </div>
      </div>
      <div class="card-title">Bienvenido</div>
      <div class="card-desc">Accedé a tu sistema de facturación electrónica</div>
    </div>

    <!-- TABS -->
    <div class="tabs">
      <button class="tab active" onclick="switchTab('login')">Ingresar</button>
      <button class="tab" onclick="switchTab('register')">Crear cuenta</button>
    </div>

    <!-- BODY -->
    <div class="card-body">

      <!-- MENSAJE DE ERROR/ÉXITO -->
      <div class="msg error" id="msgError">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><circle cx="7" cy="7" r="6" stroke="currentColor" stroke-width="1.3"/><path d="M7 4.5v3M7 9.5h.01" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
        <span id="msgErrorTxt"></span>
      </div>
      <div class="msg success" id="msgOk">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><circle cx="7" cy="7" r="6" stroke="currentColor" stroke-width="1.3"/><path d="M4.5 7l2 2 3-3" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
        <span id="msgOkTxt"></span>
      </div>

      <!-- PANEL: LOGIN -->
      <div class="form-panel active" id="panelLogin">

        <!-- Google -->
        <a class="btn-google" href="/auth/google">
          <svg width="18" height="18" viewBox="0 0 18 18"><path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.875 2.684-6.615z" fill="#4285F4"/><path d="M9 18c2.43 0 4.467-.806 5.956-2.184l-2.908-2.258c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332C2.438 15.983 5.482 18 9 18z" fill="#34A853"/><path d="M3.964 10.707c-.18-.54-.282-1.117-.282-1.707s.102-1.167.282-1.707V4.961H.957C.347 6.175 0 7.55 0 9s.348 2.825.957 4.039l3.007-2.332z" fill="#FBBC05"/><path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0 5.482 0 2.438 2.017.957 4.961L3.964 7.293C4.672 5.163 6.656 3.58 9 3.58z" fill="#EA4335"/></svg>
          Continuar con Google
        </a>

        <div class="divider">o con email</div>

        <div class="field">
          <label>Email</label>
          <input id="loginEmail" type="email" placeholder="tu@email.com" autocomplete="email"/>
        </div>
        <div class="field">
          <label>Contraseña</label>
          <div class="pass-wrap">
            <input id="loginPass" type="password" placeholder="••••••••" autocomplete="current-password"/>
            <button type="button" class="pass-toggle" onclick="togglePass('loginPass',this)">
              <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M1 8s2.5-5 7-5 7 5 7 5-2.5 5-7 5-7-5-7-5z" stroke="currentColor" stroke-width="1.3"/><circle cx="8" cy="8" r="2" stroke="currentColor" stroke-width="1.3"/></svg>
            </button>
          </div>
        </div>

        <button class="btn-submit" id="btnLogin" onclick="login()">
          <div class="btn-spinner" id="spinLogin"></div>
          <span id="lblLogin">Ingresar</span>
        </button>

      </div>

      <!-- PANEL: REGISTER -->
      <div class="form-panel" id="panelRegister">

        <a class="btn-google" href="/auth/google">
          <svg width="18" height="18" viewBox="0 0 18 18"><path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.875 2.684-6.615z" fill="#4285F4"/><path d="M9 18c2.43 0 4.467-.806 5.956-2.184l-2.908-2.258c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332C2.438 15.983 5.482 18 9 18z" fill="#34A853"/><path d="M3.964 10.707c-.18-.54-.282-1.117-.282-1.707s.102-1.167.282-1.707V4.961H.957C.347 6.175 0 7.55 0 9s.348 2.825.957 4.039l3.007-2.332z" fill="#FBBC05"/><path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0 5.482 0 2.438 2.017.957 4.961L3.964 7.293C4.672 5.163 6.656 3.58 9 3.58z" fill="#EA4335"/></svg>
          Registrarse con Google
        </a>

        <div class="divider">o con email</div>

        <div class="field-row">
          <div class="field">
            <label>Nombre</label>
            <input id="regNombre" type="text" placeholder="María" autocomplete="given-name"/>
          </div>
          <div class="field">
            <label>Apellido</label>
            <input id="regApellido" type="text" placeholder="García" autocomplete="family-name"/>
          </div>
        </div>
        <div class="field">
          <label>Email</label>
          <input id="regEmail" type="email" placeholder="tu@email.com" autocomplete="email"/>
        </div>
        <div class="field">
          <label>Contraseña</label>
          <div class="pass-wrap">
            <input id="regPass" type="password" placeholder="Mínimo 8 caracteres" autocomplete="new-password"/>
            <button type="button" class="pass-toggle" onclick="togglePass('regPass',this)">
              <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M1 8s2.5-5 7-5 7 5 7 5-2.5 5-7 5-7-5-7-5z" stroke="currentColor" stroke-width="1.3"/><circle cx="8" cy="8" r="2" stroke="currentColor" stroke-width="1.3"/></svg>
            </button>
          </div>
        </div>

        <button class="btn-submit" id="btnRegister" onclick="register()">
          <div class="btn-spinner" id="spinRegister"></div>
          <span id="lblRegister">Crear cuenta</span>
        </button>

        <div class="terms">
          Al registrarte aceptás los <a href="#">Términos de uso</a> y la <a href="#">Política de privacidad</a>
        </div>

      </div>

    </div><!-- /card-body -->

    <!-- FOOTER -->
    <div class="card-footer">
      <div class="card-footer-brand">KOI-FACTURA</div>
      <div class="card-footer-sub">Sistema de Facturación Electrónica</div>
    </div>

  </div><!-- /login-card -->

  <script>
    // ── TAB SWITCHER ────────────────────────────────────────
    function switchTab(tab) {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.form-panel').forEach(p => p.classList.remove('active'));
      document.querySelector(`.tab:nth-child(${tab === 'login' ? 1 : 2})`).classList.add('active');
      document.getElementById(tab === 'login' ? 'panelLogin' : 'panelRegister').classList.add('active');
      clearMessages();
    }

    // ── MESSAGES ────────────────────────────────────────────
    function showError(txt) {
      const el = document.getElementById('msgError');
      document.getElementById('msgErrorTxt').textContent = txt;
      el.style.display = 'flex';
      document.getElementById('msgOk').style.display = 'none';
    }
    function showSuccess(txt) {
      const el = document.getElementById('msgOk');
      document.getElementById('msgOkTxt').textContent = txt;
      el.style.display = 'flex';
      document.getElementById('msgError').style.display = 'none';
    }
    function clearMessages() {
      document.getElementById('msgError').style.display = 'none';
      document.getElementById('msgOk').style.display   = 'none';
    }

    // ── LOADING STATE ───────────────────────────────────────
    function setLoading(btnId, spinId, lblId, loading) {
      document.getElementById(btnId).disabled = loading;
      document.getElementById(spinId).style.display = loading ? 'block' : 'none';
      document.getElementById(lblId).style.opacity  = loading ? '0' : '1';
    }

    // ── PASS TOGGLE ─────────────────────────────────────────
    function togglePass(inputId, btn) {
      const inp = document.getElementById(inputId);
      const isText = inp.type === 'text';
      inp.type = isText ? 'password' : 'text';
      btn.innerHTML = isText
        ? `<svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M1 8s2.5-5 7-5 7 5 7 5-2.5 5-7 5-7-5-7-5z" stroke="currentColor" stroke-width="1.3"/><circle cx="8" cy="8" r="2" stroke="currentColor" stroke-width="1.3"/></svg>`
        : `<svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M2 2l12 12M6.5 6.5A2 2 0 0 0 9.5 9.5M1 8s1.5-3 4-4.5M15 8s-2.5 5-7 5c-1.5 0-2.8-.4-4-1" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>`;
    }

    // ── LOGIN ────────────────────────────────────────────────
    async function login() {
      clearMessages();
      const email    = document.getElementById('loginEmail').value.trim();
      const password = document.getElementById('loginPass').value;
      if (!email || !password) { showError('Completá email y contraseña.'); return; }

      setLoading('btnLogin','spinLogin','lblLogin', true);
      try {
        const res = await fetch('/auth/login', {
          method:'POST',
          headers:{'Content-Type':'application/json'},
          body:JSON.stringify({ email, password })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Error al ingresar');
        showSuccess('¡Bienvenido! Redirigiendo…');
        setTimeout(() => window.location.href = '/dashboard', 800);
      } catch(e) {
        showError(e.message);
      } finally {
        setLoading('btnLogin','spinLogin','lblLogin', false);
      }
    }

    // ── REGISTER ─────────────────────────────────────────────
    async function register() {
      clearMessages();
      const nombre   = document.getElementById('regNombre').value.trim();
      const apellido = document.getElementById('regApellido').value.trim();
      const email    = document.getElementById('regEmail').value.trim();
      const password = document.getElementById('regPass').value;

      if (!nombre || !email || !password) { showError('Completá todos los campos.'); return; }
      if (password.length < 8) { showError('La contraseña debe tener al menos 8 caracteres.'); return; }
      if (!email.includes('@')) { showError('El email no es válido.'); return; }

      setLoading('btnRegister','spinRegister','lblRegister', true);
      try {
        const res = await fetch('/auth/register', {
          method:'POST',
          headers:{'Content-Type':'application/json'},
          body:JSON.stringify({ nombre, apellido, email, password })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Error al registrarse');
        showSuccess('Cuenta creada. ¡Ya podés ingresar!');
        setTimeout(() => { switchTab('login'); document.getElementById('loginEmail').value = email; }, 1200);
      } catch(e) {
        showError(e.message);
      } finally {
        setLoading('btnRegister','spinRegister','lblRegister', false);
      }
    }

    // ── ENTER KEY ────────────────────────────────────────────
    document.addEventListener('keydown', e => {
      if (e.key !== 'Enter') return;
      const activePanel = document.querySelector('.form-panel.active').id;
      if (activePanel === 'panelLogin') login();
      else register();
    });

    // ── CHECK GOOGLE AUTH ERROR ──────────────────────────────
    const params = new URLSearchParams(window.location.search);
    if (params.get('error') === 'auth_failed') showError('No se pudo autenticar con Google. Intentá de nuevo.');
    if (params.get('registered')) showSuccess('Cuenta creada correctamente. Ya podés ingresar.');
  </script>
</body>
</html>
